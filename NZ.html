        ];

        let expenses = JSON.parse(localStorage.getItem('b_exp_v11')) || [];
        const checklistItems = JSON.parse(localStorage.getItem('b_chk_v11')) || [
            { g: '出發必備', n: '護照+NZeTA+NZTD', c: false },
            { g: '出發必備', n: '台灣駕照+國際駕照', c: false },
            { g: '海關嚴查', n: '洗乾淨的登山鞋', c: false },
            { g: '海關嚴查', n: '泡麵、餅乾 (需申報)', c: false },
            { g: '裝備', n: '八字轉接頭+車充', c: false },
            { g: '裝備', n: '個人有線耳機 (洞穴導覽用)', c: false }
        ];

        window.onload = () => { renderNav(); renderDay(0); renderChecklist(); renderExpenses(); };

        function renderNav() {
            const nav = document.getElementById('day-nav');
            itineraryData.forEach(d => {
                const btn = document.createElement('button');
                btn.id = `nav-${d.day}`;
                btn.className = 'flex-shrink-0 px-5 py-2 border border-slate-600 rounded-full text-xs font-medium bg-slate-800 text-slate-400 transition-all focus:outline-none';
                btn.innerText = `Day ${d.day}`;
                btn.onclick = () => { 
                    document.querySelectorAll('#day-nav button').forEach(b => b.classList.remove('day-btn-active'));
                    btn.classList.add('day-btn-active');
                    renderDay(d.day);
                    btn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
                };
                nav.appendChild(btn);
            });
            document.getElementById('nav-0').classList.add('day-btn-active');
        }

        function renderDay(dayNum) {
            const view = document.getElementById('main-view');
            const data = itineraryData.find(d => d.day === dayNum);
            updateWeather(data.lat, data.lon, data.city);

            let html = `
                <div class="glass-panel rounded-2xl p-4 mb-6 border-l-4 border-brand shadow-2xl">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-2xl font-bold text-white">Day ${data.day} <span class="text-brand text-base ml-1">${data.date}</span></h2>
                        <div class="bg-brand/20 px-2 py-1 rounded text-brand text-[10px] font-bold">🕙 出發：${data.depart}</div>
                    </div>
                    <p class="text-xs text-slate-300 leading-relaxed"><i class="fa-solid fa-circle-info text-brand mr-1"></i> ${data.note}</p>
                </div>
                <div class="relative border-l-2 border-slate-700 ml-3 space-y-8 pb-10">
            `;

            data.events.forEach(ev => {
                const mapURL = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ev.loc)}`;
                const parkURL = `https://www.google.com/maps/search/parking+near+${encodeURIComponent(ev.loc + ' parking')}`;
                const marketURL = `https://www.google.com/maps/search/supermarket+near+${encodeURIComponent(ev.loc + ' supermarket')}`;
                const laundryURL = `https://www.google.com/maps/search/laundromat+near+${encodeURIComponent(ev.loc + ' laundromat')}`;
                
                let dotColor = ev.isHotel ? 'bg-blue-500' : (ev.type === 'warning' ? 'bg-red-500' : (ev.type === 'transport' ? 'bg-green-500' : 'bg-brand'));

                html += `
                    <div class="relative pl-6">
                        <div class="absolute w-4 h-4 rounded-full ${dotColor} -left-[9px] top-1 border-4 border-[#0f172a]"></div>
                        <div class="glass-panel rounded-xl p-4">
                            <div class="flex justify-between mb-2">
                                <span class="text-[10px] font-bold text-slate-400">${ev.time}</span>
                                <button onclick="quickExp('${ev.accLoc}')" class="text-brand text-[10px] font-bold bg-slate-800 px-2 py-0.5 rounded-full active:scale-95 transition-transform"><i class="fa-solid fa-coins mr-1"></i>記帳</button>
                            </div>
                            <h3 class="text-sm font-bold text-white mb-2 leading-tight">${ev.title}</h3>
                            <p class="text-[11.5px] text-slate-300 mb-4 leading-relaxed">${ev.desc}</p>
                            
                            <div class="flex flex-wrap gap-2">
                                <a href="${mapURL}" target="_blank" class="nav-btn text-brand border-brand/30"><i class="fa-solid fa-location-arrow"></i>導航</a>
                                ${ev.hasPark ? `<a href="${parkURL}" target="_blank" class="nav-btn text-yellow-400 border-yellow-400/30"><i class="fa-solid fa-square-parking"></i>停車</a>` : ''}
                                ${ev.isHotel ? `
                                    <a href="${marketURL}" target="_blank" class="nav-btn text-orange-400 border-orange-400/30"><i class="fa-solid fa-cart-shopping"></i>超市</a>
                                    <a href="${laundryURL}" target="_blank" class="nav-btn text-blue-400 border-blue-400/30"><i class="fa-solid fa-soap"></i>洗衣</a>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            view.innerHTML = html + '</div>';
            switchTab('itinerary');
        }

        async function updateWeather(lat, lon, city) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const weather = await res.json();
                const temp = Math.round(weather.current_weather.temperature);
                const code = weather.current_weather.weathercode;
                
                let icon = '';
                let condition = '';
                if (code <= 1) {
                    icon = '<i class="fa-solid fa-sun text-yellow-400"></i>';
                    condition = '晴朗';
                } else if (code <= 3) {
                    icon = '<i class="fa-solid fa-cloud-sun text-yellow-200"></i>';
                    condition = '多雲';
                } else if (code <= 48) {
                    icon = '<i class="fa-solid fa-cloud text-gray-400"></i>';
                    condition = '陰天/霧';
                } else if (code <= 67 || (code >= 80 && code <= 82)) {
                    icon = '<i class="fa-solid fa-cloud-rain text-blue-400"></i>';
                    condition = '下雨';
                } else if (code <= 77 || code >= 85) {
                    icon = '<i class="fa-solid fa-snowflake text-white"></i>';
                    condition = '降雪';
                } else {
                    icon = '<i class="fa-solid fa-cloud-showers-heavy text-blue-500"></i>';
                    condition = '陣雨';
                }

                document.getElementById('temp').innerText = `${temp}°C`;
                document.getElementById('city').innerText = `${city} • ${condition}`;
                document.getElementById('weather-icon').innerHTML = icon;
            } catch(e) { 
                document.getElementById('temp').innerText = '--°C'; 
                document.getElementById('city').innerText = city;
                document.getElementById('weather-icon').innerHTML = '';
            }
        }

        function switchTab(t) {
            ['main-view', 'checklist-view', 'accounting-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
            ['t-itinerary', 't-checklist', 't-accounting'].forEach(b => document.getElementById(b).classList.replace('text-brand', 'text-slate-400'));
            
            document.getElementById(`${t === 'itinerary' ? 'main-view' : t + '-view'}`).classList.remove('hidden');
            document.getElementById(`t-${t}`).classList.replace('text-slate-400', 'text-brand');
            window.scrollTo(0,0);
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-content');
            container.innerHTML = '';
            const groups = [...new Set(checklistItems.map(i => i.g))];
            groups.forEach(g => {
                let h = `<div class="mb-4"><h3 class="text-xs font-bold text-brand mb-2 px-1">${g}</h3><div class="glass-panel rounded-xl overflow-hidden divide-y divide-slate-700/50">`;
                checklistItems.filter(i => i.g === g).forEach(i => {
                    h += `<label class="check-item flex items-center p-4 active:bg-slate-800/50"><input type="checkbox" class="hidden" onchange="toggleC('${i.n}')" ${i.c ? 'checked' : ''}><div class="flex-1 text-sm font-medium">${i.n}</div><i class="fa-solid fa-circle-check text-lg ${i.c ? 'text-brand' : 'text-slate-700'}"></i></label>`;
                });
                container.innerHTML += h + '</div></div>';
            });
        }
        function toggleC(n) { const i = checklistItems.find(x => x.n === n); i.c = !i.c; localStorage.setItem('b_chk_v11', JSON.stringify(checklistItems)); renderChecklist(); }

        function quickExp(loc) { switchTab('accounting'); document.getElementById('exp-note').value = loc; document.getElementById('exp-amount').focus(); }
        function saveExpense() {
            const a = document.getElementById('exp-amount').value;
            if(!a) return;
            expenses.push({ id: Date.now(), a: parseFloat(a), c: document.getElementById('exp-cat').value, n: document.getElementById('exp-note').value, d: new Date().toLocaleDateString() });
            localStorage.setItem('b_exp_v11', JSON.stringify(expenses));
            document.getElementById('exp-amount').value = ''; renderExpenses();
        }
        function renderExpenses() {
            const list = document.getElementById('exp-list');
            list.innerHTML = ''; let total = 0;
            expenses.slice().reverse().forEach(e => {
                total += e.a;
                list.innerHTML += `<div class="glass-panel p-3 rounded-xl flex justify-between items-center"><div><p class="text-xs font-bold">${e.n}</p><p class="text-[9px] text-slate-500">${e.c} • ${e.d}</p></div><div class="flex items-center gap-3"><span class="text-sm font-bold text-brand">NZD ${e.a.toFixed(2)}</span><button onclick="delE(${e.id})" class="text-red-400 text-xs px-2"><i class="fa-solid fa-trash-can"></i></button></div></div>`;
            });
            document.getElementById('total-nz').innerText = `NZD ${total.toFixed(2)}`;
        }
        function delE(id) { expenses = expenses.filter(x => x.id !== id); localStorage.setItem('b_exp_v11', JSON.stringify(expenses)); renderExpenses(); }
    </script>
</body>
</html>
