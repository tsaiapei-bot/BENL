    <script>

            theme: {
                extend: {
                    colors: { brand: '#2dd4bf', glassbg: 'rgba(30, 41, 59, 0.6)' }
                }
            }
        }

<body class="antialiased pb-24 overflow-hidden">

        <div class="glass-panel p-6 rounded-3xl w-full max-w-sm flex flex-col gap-5 shadow-2xl">

                <input type="password" id="pin-input" placeholder="輸入 4 碼密碼" class="text-center text-xl tracking-[0.5em] font-bold bg-slate-800 rounded-xl p-3 text-white border-2 border-slate-600 focus:border-brand focus:ring-0 outline-none transition-colors" inputmode="numeric" maxlength="4">

    </div>

    <header class="sticky top-0 z-50 glass-panel shadow-xl">

    <main class="p-4 max-w-2xl mx-auto" id="main-view"></main>

    <div id="checklist-view" class="hidden p-4 max-w-2xl mx-auto">

        <div class="glass-panel rounded-2xl p-5 mb-6">

                    <option value="NTD">NTD 台幣</option>

                <select id="exp-cat" class="bg-slate-800 rounded-lg p-3 text-sm border-none focus:ring-1 focus:ring-brand outline-none">

            </div>
        </div>
        <div id="exp-list" class="space-y-2 pb-10"></div>
    </div>

    <footer id="main-footer" class="fixed bottom-0 left-0 right-0 glass-panel border-t border-slate-700 p-2 z-50 flex justify-around items-center">

        </button>
    </footer>

              events: [
                { time: '11:00 - 13:00', title: '奧克蘭魚市場 (Auckland Fish Market)', desc: '座落於百年碼頭邊，被譽為紐西蘭的海鮮心臟。是品嚐新鮮生蠔與炸魚薯條的絕佳去處。', loc: 'Auckland Fish Market', accLoc: '魚市場', hasPark: false },
                { time: '14:00 - 16:00', title: '奧克蘭天空塔 (Sky Tower)', desc: '南半球第一高塔，搭乘透明電梯直達觀景台，360 度鳥瞰「帆之都」。', loc: 'Sky Tower Auckland', accLoc: '天空塔', hasPark: false },
                { time: '16:30 - 18:30', title: '帕奈爾村 (Parnell Village)', desc: '奧克蘭歷史最悠久的近郊街區。保留了許多維多利亞式建築與文青風格的精品商店。', loc: 'Parnell Village', accLoc: '帕奈爾村', hasPark: false }
              ],
              hotel: { title: '奧克蘭希爾頓酒店 (Hilton Auckland)', desc: '返回飯店放鬆。', loc: 'Hilton Auckland', accLoc: '奧克蘭希爾頓', hasPark: false }
            },
            { day: 10, date: '5/18 一', city: 'Auckland', depart: '09:30', note: '市區巡禮與最後的美景', lat: -36.84, lon: 174.76,
              events: [
                { time: '10:00 - 12:30', title: '奧克蘭戰爭紀念博物館 (Auckland Museum)', desc: '館內不僅紀錄了軍事歷史，更擁有極為豐富的毛利文化館藏，是深入了解紐西蘭歷史的好去處。', loc: 'Auckland War Memorial Museum', accLoc: '奧克蘭博物館', hasPark: false },
                { time: '14:00 - 16:00', title: '伊甸山 (Mount Eden)', desc: '奧克蘭市區內最高的休眠火山。離博物館非常近，漫步火山口步道，360 度俯瞰奧克蘭市區絕美天際線，留下最後的深刻回憶。', loc: 'Mount Eden', accLoc: '伊甸山', hasPark: false }
              ],
              hotel: { title: '奧克蘭希爾頓酒店 (Hilton Auckland)', desc: '整理行李準備隔日一早返台。', loc: 'Hilton Auckland', accLoc: '奧克蘭希爾頓', hasPark: false }
            },
            { day: 11, date: '5/19 二', city: 'Auckland', depart: '05:30', note: '離境日！再見紐西蘭', lat: -37.0082, lon: 174.7850,
              events: [
                { time: '06:00 - 06:40', title: '前往機場報到', desc: '抵達奧克蘭國際機場辦理登機手續。', loc: 'Auckland Airport', accLoc: '前往機場/交通', hasPark: false },
                { time: '09:40 - 10:00', title: '搭乘紐航 NZ77 返台', desc: '再見中土世界，帶著滿滿的回憶平安歸途！', loc: 'Auckland Airport', accLoc: '奧克蘭機場免稅', type: 'warning', hasPark: false }
              ],
              hotel: null
            }
        ];

        let expenses = JSON.parse(localStorage.getItem('blake_exp_final1')) || [];
        const checklistItems = JSON.parse(localStorage.getItem('blake_chk_final1')) || [
            { g: '行前申報與費用', n: 'NZeTA 電子旅行授權', accLoc: 'NZeTA 簽證費', c: false },
            { g: '行前申報與費用', n: 'NZTD 旅客入境申報', accLoc: '', c: false },
            { g: '行前申報與費用', n: '紐西蘭上網 eSIM 卡', accLoc: '紐西蘭 eSIM 卡', c: false },
            { g: '海關嚴查', n: '洗乾淨的登山鞋 (刷底)', accLoc: '', c: false },
            { g: '海關嚴查', n: '泡麵、餅乾 (誠實報)', accLoc: '', c: false },
            { g: '裝備', n: '八字轉接頭+車充', accLoc: '轉接頭/車充', c: false },
            { g: '裝備', n: '個人有線耳機 (洞穴導覽)', accLoc: '', c: false }
        ];

        function showPinInput() {
            document.getElementById('pin-section').classList.remove('hidden');
            document.getElementById('pin-input').focus();
        }

        function verifyPin() {
            if (document.getElementById('pin-input').value === '0602') {
                isBlake = true;
                launchApp();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
            }
        }

        function loginAsGuest() {
            isBlake = false;
            document.getElementById('t-accounting').style.display = 'none';
            document.getElementById('t-checklist').classList.remove('border-l', 'border-slate-700');
            document.getElementById('app-title').innerText = '北島自駕 11 天';
            launchApp();
        }

        function launchApp() {
            document.getElementById('login-screen').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.body.classList.remove('overflow-hidden');
            }, 300);
            
            renderNav(); 
            renderDay(0); 
            renderChecklist(); 
            if(isBlake) {
                fetchExchangeRate(); 
                renderExpenses();
            }
        }

        function renderNav() {
            const nav = document.getElementById('day-nav');
            itineraryData.forEach(d => {
                const btn = document.createElement('button');
                btn.id = `nav-${d.day}`;
                btn.className = 'flex-shrink-0 px-5 py-2 border border-slate-600 rounded-full text-xs font-medium bg-slate-800 text-slate-400 transition-all focus:outline-none';
                btn.innerText = `Day ${d.day}`;
                btn.onclick = () => { 
                    document.querySelectorAll('#day-nav button').forEach(b => b.classList.remove('day-btn-active'));
                    btn.classList.add('day-btn-active');
                    renderDay(d.day);
                    btn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
                };
                nav.appendChild(btn);
            });
            document.getElementById('nav-0').classList.add('day-btn-active');
        }

        function renderDay(dayNum) {
            const view = document.getElementById('main-view');
            const data = itineraryData.find(d => d.day === dayNum);
            updateWeather(data.lat, data.lon, data.city);

            let html = `
                <div class="glass-panel rounded-2xl p-4 mb-6 border-l-4 border-brand shadow-2xl">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-2xl font-bold text-white">Day ${data.day} <span class="text-brand text-base ml-1">${data.date}</span></h2>
                        <div class="bg-brand/20 px-2 py-1 rounded text-brand text-[10px] font-bold">🕙 出發：${data.depart}</div>
                    </div>
                    <p class="text-xs text-slate-300 leading-relaxed"><i class="fa-solid fa-circle-info text-brand mr-1"></i> ${data.note}</p>
                </div>
                <div class="relative border-l-2 border-slate-700 ml-3 pb-4">
            `;

            data.events.forEach(ev => {
                const mapURL = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ev.loc)}`;
                const parkURL = `https://www.google.com/maps/search/parking+near+${encodeURIComponent(ev.loc + ' parking')}`;
                
                let dotColor = ev.type === 'warning' ? 'bg-red-500' : (ev.type === 'transport' ? 'bg-green-500' : 'bg-brand');

                html += `
                    <div class="relative pl-6 mb-8">
                        <div class="absolute w-4 h-4 rounded-full ${dotColor} -left-[9px] top-1 border-4 border-[#0f172a]"></div>
                        <div class="glass-panel rounded-xl p-4 shadow-lg">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-bold text-slate-400 bg-slate-800 px-2 py-0.5 rounded">${ev.time}</span>
                                ${isBlake ? `<button onclick="quickExp('${ev.accLoc}')" class="text-brand text-[10px] font-bold bg-slate-800 px-2 py-0.5 rounded-full active:scale-95 transition-transform"><i class="fa-solid fa-coins mr-1"></i>記帳</button>` : ''}
                            </div>
                            <h3 class="text-sm font-bold text-white mb-2 leading-tight">${ev.title}</h3>
                            <p class="text-[11.5px] text-slate-300 mb-4 leading-relaxed">${ev.desc}</p>
                            
                            <div class="flex flex-wrap gap-2">
                                <a href="${mapURL}" target="_blank" class="nav-btn text-brand border-brand/30"><i class="fa-solid fa-location-arrow"></i>地圖導航</a>
                                ${ev.hasPark ? `<a href="${parkURL}" target="_blank" class="nav-btn text-yellow-400 border-yellow-400/30"><i class="fa-solid fa-square-parking"></i>找停車場</a>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;

            if(data.hotel) {
                const mapURL = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(data.hotel.loc)}`;
                const marketURL = `https://www.google.com/maps/search/supermarket+near+${encodeURIComponent(data.hotel.loc + ' supermarket')}`;
                const laundryURL = `https://www.google.com/maps/search/laundromat+near+${encodeURIComponent(data.hotel.loc + ' laundromat')}`;

                html += `
                    <div class="mt-4 pt-4 border-t border-slate-700">
                        <h3 class="text-xs font-bold text-slate-400 mb-3"><i class="fa-solid fa-bed mr-2"></i>當晚住宿資訊</h3>
                        <div class="glass-panel rounded-xl p-4 border-l-4 border-blue-500 relative shadow-lg">
                            ${isBlake ? `<button onclick="quickExp('${data.hotel.accLoc}')" class="absolute top-4 right-4 text-brand text-[10px] font-bold bg-slate-800 px-2 py-0.5 rounded-full active:scale-95 transition-transform"><i class="fa-solid fa-coins mr-1"></i>記帳</button>` : ''}
                            <h4 class="text-sm font-bold text-white mb-2 leading-tight pr-12">${data.hotel.title}</h4>
                            <p class="text-[11.5px] text-slate-300 mb-4 leading-relaxed">${data.hotel.desc}</p>
                            <div class="flex flex-wrap gap-2">
                                <a href="${mapURL}" target="_blank" class="nav-btn text-brand border-brand/30"><i class="fa-solid fa-location-arrow"></i>飯店導航</a>
                                <a href="${marketURL}" target="_blank" class="nav-btn text-orange-400 border-orange-400/30"><i class="fa-solid fa-cart-shopping"></i>附近超市</a>
                                <a href="${laundryURL}" target="_blank" class="nav-btn text-blue-400 border-blue-400/30"><i class="fa-solid fa-soap"></i>自助洗衣</a>
                            </div>
                        </div>
                    </div>
                `;
            }

            view.innerHTML = html;
            switchTab('itinerary');
        }

        async function updateWeather(lat, lon, city) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const weather = await res.json();
                const temp = Math.round(weather.current_weather.temperature);
                const code = weather.current_weather.weathercode;
                
                let icon = '', condition = '';
                if (code <= 1) { icon = '<i class="fa-solid fa-sun text-yellow-400"></i>'; condition = '晴朗'; }
                else if (code <= 3) { icon = '<i class="fa-solid fa-cloud-sun text-yellow-200"></i>'; condition = '多雲'; }
                else if (code <= 48) { icon = '<i class="fa-solid fa-cloud text-gray-400"></i>'; condition = '陰天/霧'; }
                else if (code <= 67 || (code >= 80 && code <= 82)) { icon = '<i class="fa-solid fa-cloud-rain text-blue-400"></i>'; condition = '下雨'; }
                else if (code <= 77 || code >= 85) { icon = '<i class="fa-solid fa-snowflake text-white"></i>'; condition = '降雪'; }
                else { icon = '<i class="fa-solid fa-cloud-showers-heavy text-blue-500"></i>'; condition = '陣雨'; }

                document.getElementById('temp').innerText = `${temp}°C`;
                document.getElementById('city').innerText = `${city} • ${condition}`;
                document.getElementById('weather-icon').innerHTML = icon;
            } catch(e) { 
                document.getElementById('temp').innerText = '--°C'; 
                document.getElementById('city').innerText = city;
                document.getElementById('weather-icon').innerHTML = '';
            }
        }

        async function fetchExchangeRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/NZD');
                const data = await res.json();
                if(data && data.rates && data.rates.TWD) {
                    currentRate = data.rates.TWD;
                    document.getElementById('auto-rate').innerText = currentRate.toFixed(2);
                    renderExpenses(); 
                }
            } catch(e) {
                document.getElementById('auto-rate').innerText = '19.50 (離線預設)';
            }
        }

        function switchTab(t) {
            ['main-view', 'checklist-view', 'accounting-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
            ['t-itinerary', 't-checklist', 't-accounting'].forEach(b => document.getElementById(b).classList.replace('text-brand', 'text-slate-400'));
            
            document.getElementById(`${t === 'itinerary' ? 'main-view' : t + '-view'}`).classList.remove('hidden');
            document.getElementById(`t-${t}`).classList.replace('text-slate-400', 'text-brand');
            window.scrollTo(0,0);
            if(t === 'accounting' && isBlake) renderExpenses();
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-content');
            container.innerHTML = '';
            const groups = [...new Set(checklistItems.map(i => i.g))];
            groups.forEach(g => {
                let h = `<div class="mb-4"><h3 class="text-xs font-bold text-brand mb-2 px-1">${g}</h3><div class="glass-panel rounded-xl overflow-hidden divide-y divide-slate-700/50">`;
                checklistItems.filter(i => i.g === g).forEach(i => {
                    const accBtn = (isBlake && i.accLoc) ? `<button onclick="quickExp('${i.accLoc}')" class="ml-3 text-brand text-[10px] font-bold bg-slate-800 border border-brand/30 px-2 py-1 rounded-md active:scale-95"><i class="fa-solid fa-coins mr-1"></i>記帳</button>` : '';
                    h += `<div class="flex items-center justify-between p-4 active:bg-slate-800/50">
                            <label class="check-item flex items-center flex-1 cursor-pointer">
                                <input type="checkbox" class="hidden" onchange="toggleC('${i.n}')" ${i.c ? 'checked' : ''}>
                                <div class="flex-1 text-sm font-medium pr-2">${i.n}</div>
                                <i class="fa-solid fa-circle-check text-lg ${i.c ? 'text-brand' : 'text-slate-700'}"></i>
                            </label>
                            ${accBtn}
                          </div>`;
                });
                container.innerHTML += h + '</div></div>';
            });
        }
        
        function toggleC(n) { const i = checklistItems.find(x => x.n === n); i.c = !i.c; localStorage.setItem('blake_chk_final1', JSON.stringify(checklistItems)); renderChecklist(); }

        function quickExp(loc) { 
            if(!isBlake) return;
            switchTab('accounting'); 
            document.getElementById('exp-note').value = loc; 
            document.getElementById('exp-amount').focus(); 
        }

        function saveExpense() {
            const a = parseFloat(document.getElementById('exp-amount').value);
            const currency = document.getElementById('exp-currency').value;
            if(!a) return alert('哥，錢要填喔！');

            expenses.push({ 
                id: Date.now(), 
                amount: a, 
                currency: currency,
                cat: document.getElementById('exp-cat').value, 
                note: document.getElementById('exp-note').value, 
                date: new Date().toLocaleDateString() 
            });
            localStorage.setItem('blake_exp_final1', JSON.stringify(expenses));
            document.getElementById('exp-amount').value = ''; 
            renderExpenses();
        }

        function renderExpenses() {
            const list = document.getElementById('exp-list');
            list.innerHTML = ''; 
            
            let totalNZD = 0;
            let totalNTD = 0;

            expenses.slice().reverse().forEach(e => {
                if(e.currency === 'NZD') {
                    totalNZD += e.amount;
                    totalNTD += e.amount * currentRate;
                } else {
                    totalNTD += e.amount;
                    totalNZD += e.amount / currentRate;
                }

                list.innerHTML += `
                    <div class="glass-panel p-3 rounded-xl flex justify-between items-center mb-2">
                        <div>
                            <p class="text-xs font-bold">${e.note}</p>
                            <p class="text-[9px] text-slate-500">${e.cat} • ${e.date}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold ${e.currency === 'NZD' ? 'text-brand' : 'text-blue-300'}">${e.currency} ${e.amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                            <button onclick="delE(${e.id})" class="text-red-400 text-xs px-2"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
            });
            
            document.getElementById('total-nzd').innerText = `NZD ${totalNZD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('total-ntd').innerText = `約 NTD ${Math.round(totalNTD).toLocaleString()}`;
        }

        function delE(id) { expenses = expenses.filter(x => x.id !== id); localStorage.setItem('blake_exp_final1', JSON.stringify(expenses)); renderExpenses(); }
    </script>
</body>
</html>
