<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紐西蘭北島 10 天逆時針自駕全攻略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#2dd4bf', // Teal-400
                        glassbg: 'rgba(30, 41, 59, 0.6)',
                        glassborder: 'rgba(51, 65, 85, 0.5)'
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
        }
        /* 隱藏橫向滾動條 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 毛玻璃共用樣式 */
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
    </style>
</head>
<body class="antialiased pb-20">

    <header class="sticky top-0 z-50 glass-panel shadow-lg">
        <div class="px-4 pt-4 pb-2">
            <h1 class="text-xl font-bold text-white tracking-wide"><i class="fa-solid fa-route text-brand mr-2"></i>紐西蘭自駕攻略</h1>
        </div>
        
        <div class="px-4 py-3 border-t border-slate-700/50 flex gap-3 overflow-x-auto hide-scrollbar" id="dashboard">
            <div class="flex-shrink-0 bg-slate-800/80 rounded-lg p-2.5 flex items-center gap-3 border border-slate-700/50 min-w-[140px]">
                <div id="weather-icon" class="text-2xl text-yellow-400"><i class="fa-solid fa-spinner fa-spin"></i></div>
                <div>
                    <div id="weather-city" class="text-xs text-slate-400">載入中...</div>
                    <div id="weather-temp" class="text-sm font-bold text-white">--°C</div>
                </div>
            </div>
            <div class="flex-shrink-0 bg-slate-800/80 rounded-lg p-2.5 border-l-4 border-l-red-500 border border-slate-700/50 min-w-[200px]">
                <div class="text-xs text-slate-400 mb-0.5">每日重點提醒</div>
                <div id="daily-note" class="text-sm font-medium text-white truncate">左右滑動日期查看行程</div>
            </div>
        </div>

        <nav class="flex overflow-x-auto hide-scrollbar px-2 py-2 border-t border-slate-700/50" id="day-nav">
            </nav>
    </header>

    <main class="p-4 max-w-2xl mx-auto" id="itinerary-container">
        </main>

    <script>
        // 行程資料庫 (整合您的 10 天逆時針路線與重點)
        const itineraryData = [
            {
                day: 1, date: '5/9 六', city: 'Auckland', lat: -36.8485, lon: 174.7633, note: '入境注意申報物品，領車自駕',
                events: [
                    { time: '09:15', title: '抵達奧克蘭機場 (AKL)', desc: '台灣護照免簽，確認 NZeTA 與 NZTD 申報完成。穿過的登山鞋、食品務必申報！', type: 'warning' },
                    { time: '上午', title: '漫步伊甸山 (Mount Eden)', desc: '火山口俯瞰奧克蘭市景', type: 'activity', location: 'Mount Eden' },
                    { time: '晚上', title: '入住 Hilton Karaka', desc: '調整時差，為明日長途駕駛準備', type: 'hotel', location: 'DoubleTree by Hilton Auckland Karaka' }
                ]
            },
            {
                day: 2, date: '5/10 日', city: 'Waitomo', lat: -38.2611, lon: 175.1158, note: '懷托摩雙洞穴探險，螢火蟲洞禁拍照',
                events: [
                    { time: '11:40', title: '抵達懷托摩報到', desc: '從 Karaka 出發車程約 2 小時', type: 'transport' },
                    { time: '12:00', title: '螢火蟲洞 (WGC)', desc: '🚨 嚴格禁止拍照，靜靜欣賞藍光點點', type: 'warning' },
                    { time: '13:30', title: '魯阿庫里洞 (Ruakuri Cave)', desc: '允許無閃光燈拍照', type: 'activity' },
                    { time: '傍晚', title: '入住 Hilton Lake Taupo', desc: '懷托摩至陶波車程約 2 小時', type: 'hotel', location: 'Hilton Lake Taupo' }
                ]
            },
            {
                day: 3, date: '5/11 一', city: 'Taupo', lat: -38.6843, lon: 176.0708, note: '陶波湖周邊放鬆行程',
                events: [
                    { time: '上午', title: '胡卡瀑布 (Huka Falls)', desc: '觀看水流磅礡的奇觀。若體力許可可走健行步道', type: 'activity' },
                    { time: '中午', title: '月球環形山 (Craters of the Moon)', desc: '欣賞地熱奇觀', type: 'activity' },
                    { time: '下午', title: '飛機麥當勞打卡', desc: '退役飛機內用餐，機艙座位開放至 16:30', type: 'activity', location: 'McDonald\'s Taupo' },
                    { time: '晚上', title: '續住 Hilton Lake Taupo', desc: '準備明日火山健行', type: 'hotel' }
                ]
            },
            {
                day: 4, date: '5/12 二', city: 'Tongariro', lat: -39.2905, lon: 175.5411, note: '末日火山朝聖，注意保暖防風',
                events: [
                    { time: '全天', title: '東格里羅國家公園 (Tongariro)', desc: '朝聖末日火山地貌', type: 'activity' },
                    { time: '注意', title: '纜車維修預警', desc: '5月1日至5月29日 Sky Waka 觀光纜車年度維修關閉，改走山腳短步道漫步', type: 'warning' },
                    { time: '晚上', title: '續住 Hilton Lake Taupo', desc: '結束後返回陶波', type: 'hotel' }
                ]
            },
            {
                day: 5, date: '5/13 三', city: 'Rotorua', lat: -38.1368, lon: 176.2497, note: '前進羅托魯瓦，體驗地熱泥漿',
                events: [
                    { time: '上午', title: '懷歐塔普地熱世界 (Wai-O-Tapu)', desc: '從陶波退房後前往', type: 'activity' },
                    { time: '下午', title: '蒂普亞 (Te Puia)', desc: '觀賞間歇泉與毛利戰舞', type: 'activity' },
                    { time: '傍晚', title: '地獄之門泥漿溫泉 (Hell\'s Gate)', desc: '泥漿體驗上限為 20 分鐘，避免過度浸泡', type: 'warning' },
                    { time: '晚上', title: '入住 Rock Solid Backpackers', desc: '抵達羅托魯瓦市區', type: 'hotel', location: 'Rock Solid Backpackers Rotorua' }
                ]
            },
            {
                day: 6, date: '5/14 四', city: 'Rotorua', lat: -38.1368, lon: 176.2497, note: '紅木森林與極限滑板車',
                events: [
                    { time: '上午', title: '紅木森林天空步道 (Redwoods Treewalk)', desc: '漫步巨木之間', type: 'activity' },
                    { time: '下午', title: 'Skyline 天空纜車與滑板車', desc: '挑戰 1.8 公里極限賽道', type: 'activity', location: 'Skyline Rotorua' },
                    { time: '晚上', title: '續住 Rock Solid Backpackers', desc: '可順道去 Kuirau Park 免費看泥漿池', type: 'hotel' }
                ]
            },
            {
                day: 7, date: '5/15 五', city: 'Matamata', lat: -37.8242, lon: 175.7745, note: '中土世界哈比村，傍晚長途駕駛',
                events: [
                    { time: '上午', title: '夢幻秘境藍泉 (Blue Spring)', desc: '清澈見底的絕美泉水', type: 'activity' },
                    { time: '下午', title: '哈比人村 (Hobbiton)', desc: '電影導覽與綠龍酒館體驗，需提前預約', type: 'activity', location: 'Hobbiton Movie Set' },
                    { time: '傍晚', title: '驅車前往科羅曼德半島', desc: '長途駕駛，車程約 2.5~3 小時', type: 'transport' },
                    { time: '晚上', title: '入住半島周邊住宿', desc: '為明日退潮行程做準備', type: 'hotel' }
                ]
            },
            {
                day: 8, date: '5/16 六', city: 'Coromandel', lat: -36.8377, lon: 175.8202, note: '🚨 關鍵退潮日！務必看準時間',
                events: [
                    { time: '11:30', title: '教堂灣 (Cathedral Cove)', desc: '新步道已於 2025/2 重新開放，需配合退潮前後 2 小時前往', type: 'warning' },
                    { time: '13:15', title: '溫泉海灘 (Hot Water Beach)', desc: '到達最低潮！趁現在自挖天然溫泉，小心漲潮瘋狗浪危險', type: 'activity', location: 'Hot Water Beach' },
                    { time: '下午', title: '驅車回奧克蘭還車', desc: '車程約 2.5 小時，市區據點還車', type: 'transport' },
                    { time: '晚上', title: '入住 Hilton Auckland', desc: '接下來全為免開車行程', type: 'hotel', location: 'Hilton Auckland' }
                ]
            },
            {
                day: 9, date: '5/17 日', city: 'Auckland', lat: -36.8485, lon: 174.7633, note: '奧克蘭市區一日遊 (大眾運輸/步行)',
                events: [
                    { time: '全天', title: '市區巡禮', desc: '登奧克蘭天空塔 (Sky Tower) 觀景', type: 'activity', location: 'Sky Tower Auckland' },
                    { time: '中午', title: '百年奧克蘭魚市場', desc: '享用新鮮海鮮大餐', type: 'activity' },
                    { time: '下午', title: '帕奈爾村 (Parnell Village)', desc: '逛文青特色商店與老建築', type: 'activity' },
                    { time: '晚上', title: '續住 Hilton Auckland', desc: '市中心放鬆', type: 'hotel' }
                ]
            },
            {
                day: 10, date: '5/18 一', city: 'Auckland', lat: -36.8485, lon: 174.7633, note: '歷史知性與伴手禮採購',
                events: [
                    { time: '上午', title: '奧克蘭戰爭紀念博物館', desc: '深入了解紐西蘭自然與毛利歷史', type: 'activity', location: 'Auckland War Memorial Museum' },
                    { time: '下午', title: '採買伴手禮', desc: '前往皇后街或 Dress Smart Outlet 掃貨', type: 'transport', location: 'Dress Smart Auckland' },
                    { time: '晚上', title: '續住 Hilton Auckland', desc: '打包行李準備回程', type: 'hotel' }
                ]
            },
            {
                day: 11, date: '5/19 二', city: 'Auckland', lat: -36.8485, lon: 174.7633, note: '再見紐西蘭，平安歸途',
                events: [
                    { time: '06:00', title: '前往奧克蘭機場', desc: '使用機場巴士或預約接送', type: 'transport' },
                    { time: '09:40', title: '搭機返台', desc: '搭乘紐西蘭航空 NZ77 班機返回台灣', type: 'warning' }
                ]
            }
        ];

        // 卡片邊框顏色對應
        const typeColors = {
            'hotel': 'border-l-blue-500',
            'warning': 'border-l-red-500',
            'activity': 'border-l-brand',
            'transport': 'border-l-green-500'
        };

        const typeIcons = {
            'hotel': '<i class="fa-solid fa-bed"></i>',
            'warning': '<i class="fa-solid fa-triangle-exclamation"></i>',
            'activity': '<i class="fa-solid fa-camera"></i>',
            'transport': '<i class="fa-solid fa-car"></i>'
        };

        const navContainer = document.getElementById('day-nav');
        const mainContainer = document.getElementById('itinerary-container');

        // 渲染導覽列與內容
        itineraryData.forEach((data, index) => {
            // 1. 產生 Nav Item
            const navItem = document.createElement('a');
            navItem.href = `#day-${data.day}`;
            navItem.className = `flex-shrink-0 px-4 py-2 mx-1 rounded-full text-sm font-medium transition-colors ${index === 0 ? 'bg-brand text-slate-900' : 'text-slate-400 hover:text-white'}`;
            navItem.innerText = `Day ${data.day}`;
            navItem.dataset.day = data.day;
            navContainer.appendChild(navItem);

            // 2. 產生內容 Section
            const section = document.createElement('section');
            section.id = `day-${data.day}`;
            section.className = 'mb-10 pt-4 scroll-mt-36';
            
            let html = `
                <div class="mb-4 flex items-end justify-between">
                    <div>
                        <h2 class="text-2xl font-bold text-white">Day ${data.day}</h2>
                        <p class="text-brand text-sm">${data.date} • ${data.city}</p>
                    </div>
                </div>
                <div class="space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:ml-[2.25rem] md:before:translate-x-0 before:h-full before:w-0.5 before:bg-slate-700">
            `;

            data.events.forEach(event => {
                const mapBtn = event.location ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.location)}" target="_blank" class="mt-3 inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-700/50 hover:bg-slate-600 rounded-md text-xs text-slate-200 transition-colors"><i class="fa-solid fa-location-dot text-brand"></i> 導航</a>` : '';
                
                html += `
                    <div class="relative flex items-start">
                        <div class="absolute left-0 ml-5 md:ml-[2.25rem] w-3 h-3 rounded-full bg-slate-800 border-2 border-slate-500 transform -translate-x-1.5 mt-1.5"></div>
                        <div class="pl-10 md:pl-16 w-full">
                            <div class="glass-panel rounded-xl p-4 border-l-4 ${typeColors[event.type]}">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-xs font-bold px-2 py-0.5 bg-slate-700 rounded text-slate-300">${event.time}</span>
                                    <span class="text-slate-400 text-sm">${typeIcons[event.type]}</span>
                                </div>
                                <h3 class="text-base font-bold text-white mb-1">${event.title}</h3>
                                <p class="text-sm text-slate-400 leading-relaxed">${event.desc}</p>
                                ${mapBtn}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div></section>`;
            section.innerHTML = html;
            mainContainer.appendChild(section);
        });

        // 導航聯動與滾動監聽
        const sections = document.querySelectorAll('section');
        const navItems = document.querySelectorAll('#day-nav a');
        
        // 處理點擊滑動導航列居中
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                navItems.forEach(nav => {
                    nav.classList.remove('bg-brand', 'text-slate-900');
                    nav.classList.add('text-slate-400');
                });
                e.target.classList.remove('text-slate-400');
                e.target.classList.add('bg-brand', 'text-slate-900');
                e.target.scrollIntoView({ inline: 'center', behavior: 'smooth' });
            });
        });

        // Intersection Observer 自動切換 Tab 與更新天氣/重點
        const observerOptions = { root: null, rootMargin: '-20% 0px -60% 0px', threshold: 0 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    const dayNum = id.split('-')[1];
                    const activeNav = document.querySelector(`a[href="#${id}"]`);
                    
                    // 更新 UI
                    navItems.forEach(nav => {
                        nav.classList.remove('bg-brand', 'text-slate-900');
                        nav.classList.add('text-slate-400');
                    });
                    activeNav.classList.remove('text-slate-400');
                    activeNav.classList.add('bg-brand', 'text-slate-900');
                    activeNav.scrollIntoView({ inline: 'center', behavior: 'smooth' });

                    // 更新儀表板資訊
                    const currentDayData = itineraryData.find(d => d.day == dayNum);
                    document.getElementById('daily-note').innerText = currentDayData.note;
                    document.getElementById('weather-city').innerText = currentDayData.city;
                    
                    // 呼叫天氣 API
                    fetchWeather(currentDayData.lat, currentDayData.lon);
                }
            });
        }, observerOptions);

        sections.forEach(sec => observer.observe(sec));

        // 呼叫 Open-Meteo 即時氣象 API
        async function fetchWeather(lat, lon) {
            try {
                // 使用 Open-Meteo V1 API
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                document.getElementById('weather-temp').innerText = `${temp}°C`;
                
                // 簡易天氣代碼轉換 icon
                const iconEl = document.getElementById('weather-icon');
                if (code <= 3) {
                    iconEl.innerHTML = '<i class="fa-solid fa-sun text-yellow-400"></i>';
                } else if (code <= 48) {
                    iconEl.innerHTML = '<i class="fa-solid fa-cloud text-gray-400"></i>';
                } else {
                    iconEl.innerHTML = '<i class="fa-solid fa-cloud-showers-heavy text-blue-400"></i>';
                }
            } catch (error) {
                console.error('Weather Fetch Error', error);
                document.getElementById('weather-temp').innerText = '--°C';
                document.getElementById('weather-icon').innerHTML = '<i class="fa-solid fa-cloud"></i>';
            }
        }
        
        // 初始化抓取 Day 1 天氣
        fetchWeather(itineraryData[0].lat, itineraryData[0].lon);
    </script>
</body>
</html>
